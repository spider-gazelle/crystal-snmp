---
name: CI

permissions: {}

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - "**.md"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Check formatting
        run: mise dev:format-check

  ameba:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise dev:deps

      - name: Run static code analysis
        run: mise dev:ameba

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise dev:deps

      - name: Build API docs
        run: mise dev:docs

      - name: Type-check the README examples
        run: mise dev:examples

  test_linux:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise dev:deps

      - name: Start the test SNMP agent
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q snmpd
          SNMP_PERSISTENT_DIR="$RUNNER_TEMP/snmpd-persist" /usr/sbin/snmpd -C -c spec/support/snmpd.conf -Lo -f &
          sleep 1

      - name: Run tests
        run: mise dev:spec

      - name: Run tests (multi-threaded)
        run: mise dev:spec-mt

      - name: Run tests (OpenSSL legacy / DES)
        run: mise dev:spec-legacy

      - name: Run tests (live agent)
        run: mise dev:spec-e2e
        env:
          TEST_SNMP_SERVER: 127.0.0.1
          TEST_SNMP_PORT: "16161"

  # Best-effort early warning against the Crystal nightly compiler. mise has no
  # nightly build, so this job uses the nightly container directly and is allowed
  # to fail. The e2e (live server) and legacy (OpenSSL legacy provider) specs are
  # skipped, matching `mise dev:spec`.
  test_nightly_linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    container: crystallang/crystal:nightly
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: shards install --skip-postinstall --skip-executables

      - name: Run tests
        run: crystal spec --error-trace --tag '~e2e' --tag '~legacy'

  test_macos_arm64:
    runs-on: macos-26
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      # TODO: remove me when https://github.com/crystal-lang/crystal/issues/16746 is fixed
      - name: Fix Crystal shards
        run: mise dev:fix-shards-command

      - name: Install dependencies
        run: mise dev:deps

      - name: Start the test SNMP agent
        run: |
          brew install net-snmp
          SNMP_PERSISTENT_DIR="$RUNNER_TEMP/snmpd-persist" "$(brew --prefix net-snmp)/sbin/snmpd" -C -c spec/support/snmpd.conf -Lo -f &
          sleep 1

      - name: Run tests
        run: mise dev:spec

      - name: Run tests (multi-threaded)
        run: mise dev:spec-mt

      - name: Run tests (OpenSSL legacy / DES)
        run: mise dev:spec-legacy

      - name: Run tests (live agent)
        run: mise dev:spec-e2e
        env:
          TEST_SNMP_SERVER: 127.0.0.1
          TEST_SNMP_PORT: "16161"
